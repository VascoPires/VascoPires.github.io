<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Composite Failure Criteria</title>

    <link rel="icon" href="/assets/img/web_icon.ico">
    <link rel="shortcut icon" href="/assets/img/web_icon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/MarchingCubes.js"></script>

    <style>
        :root {
            --bg: #111;
            --panel-bg: rgba(0, 0, 0, 0.74);
            --panel-border: #494949;
            --text-main: #f2f2f2;
            --text-dim: #b4b4b4;
            --accent: #4fc3f7;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            font-family: "Inter", "Manrope", sans-serif;
            background: var(--bg);
            color: var(--text-main);
        }

        #container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .back-home {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 30;
            text-decoration: none;
            color: #f0f0f0;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #515151;
            border-radius: 8px;
            padding: 8px 11px;
            font-size: 12px;
        }

        #criteria-panel {
            position: fixed;
            top: 58px;
            left: 14px;
            width: min(320px, calc(100vw - 28px));
            max-height: calc(100vh - 74px);
            overflow: auto;
            z-index: 20;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 12px;
            backdrop-filter: blur(7px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        #criteria-panel h3 {
            margin: 0 0 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            border-bottom: 1px solid #3f3f3f;
            padding-bottom: 6px;
        }

        .small-note {
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.35;
            margin-bottom: 8px;
        }

        #criteria-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }

        .criterion-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border: 1px solid #4f4f4f;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 8px;
        }

        .criterion-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .criterion-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .criterion-name {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .criterion-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #67c8ff;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            border: 1px solid #5a5a5a;
            border-radius: 7px;
            background: #262626;
            color: #fff;
            padding: 7px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        #render-status {
            position: fixed;
            bottom: 12px;
            left: 12px;
            z-index: 24;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid #505050;
            border-radius: 8px;
            color: #d8d8d8;
            padding: 7px 10px;
            font-size: 11px;
        }

        @media (max-width: 980px) {
            #criteria-panel {
                top: auto;
                bottom: 10px;
                max-height: min(55vh, 420px);
            }
        }
    </style>
</head>
<body>

<a class="back-home" href="{{ '/teaching/' | relative_url }}">&larr; Back to Teaching & Resources</a>

<div id="container"></div>

<div id="criteria-panel">
    <h3>Criteria Selection</h3>
    <div class="small-note">
        Toggle Maximum Stress, Maximum Strain, Tsai-Hill, and von Mises surfaces (FI = 1)
        in 3D stress space
        (&sigma;<sub>1</sub>, &sigma;<sub>2</sub>, &tau;<sub>12</sub>).<br>
        Left drag rotates camera, wheel zooms. Display uses normalized axes for readability.
    </div>
    <div id="criteria-list"></div>
    <button id="btn-reset-view" class="btn" type="button">Reset Camera View</button>
</div>

<div id="render-status">Initializing...</div>

<script>
const EPS = 1e-9;

const material = {
    name: "Hexcel IM7/8552 UD",
    core: {
        E1: 158500,
        E2: 9000,
        nu12: 0.316,
        G12: 4690,
        density: 1.58
    },
    hygrothermal: {
        alpha1: 0,
        alpha2: 0,
        beta1: 0,
        beta2: 0
    },
    strength: {
        Xt: 2501,
        Xc: 1716,
        Yt: 64.0,
        Yc: 285.7,
        S: 91.1
    },
    additional: {
        ex_maxstrain: 3.0e-3,
        ey_maxstrain: 3.0e-3,
        gxy_maxstrain: 6.0e-3,
        use_global_strains_threshold_maxstrain: 0.3
    }
};

function ratioSigned(stressComponent, tensionAllow, compressionAllow) {
    return stressComponent >= 0 ? stressComponent / Math.max(tensionAllow, EPS) : -stressComponent / Math.max(compressionAllow, EPS);
}

function computeStrainState(stress, mat) {
    const E1 = Math.max(mat.core.E1, EPS);
    const E2 = Math.max(mat.core.E2, EPS);
    const nu12 = mat.core.nu12;
    const nu21 = nu12 * E2 / E1;
    return {
        epsilon1: stress.sigma1 / E1 - nu12 * stress.sigma2 / E1,
        epsilon2: -nu21 * stress.sigma1 / E2 + stress.sigma2 / E2,
        gamma12: stress.tau12 / Math.max(mat.core.G12, EPS)
    };
}

function computeMaximumStress(stress, mat) {
    const s = mat.strength;
    const fiFiber = ratioSigned(stress.sigma1, s.Xt, s.Xc);
    const fiMatrix = ratioSigned(stress.sigma2, s.Yt, s.Yc);
    const fiShear = Math.abs(stress.tau12) / Math.max(s.S, EPS);
    return { fi: Math.max(fiFiber, fiMatrix, fiShear) };
}

function computeMaximumStrain(stress, mat) {
    const add = mat.additional;
    const strain = computeStrainState(stress, mat);
    const fi = Math.max(
        Math.abs(strain.epsilon1) / Math.max(add.ex_maxstrain, EPS),
        Math.abs(strain.epsilon2) / Math.max(add.ey_maxstrain, EPS),
        Math.abs(strain.gamma12) / Math.max(add.gxy_maxstrain, EPS)
    );
    return { fi };
}

function computeTsaiHill(stress, mat) {
    const s = mat.strength;
    const X = stress.sigma1 >= 0 ? s.Xt : s.Xc;
    const Y = stress.sigma2 >= 0 ? s.Yt : s.Yc;
    const fi =
        (stress.sigma1 / Math.max(X, EPS)) ** 2 +
        (stress.sigma2 / Math.max(Y, EPS)) ** 2 -
        (stress.sigma1 * stress.sigma2) / Math.max(X * X, EPS) +
        (stress.tau12 / Math.max(s.S, EPS)) ** 2;
    return { fi: Math.max(fi, 0) };
}

function computeVonMises(stress, mat) {
    const sigmaEq = Math.sqrt(
        stress.sigma1 * stress.sigma1 -
        stress.sigma1 * stress.sigma2 +
        stress.sigma2 * stress.sigma2 +
        3 * stress.tau12 * stress.tau12
    );
    const sigmaRef = Math.max(Math.min(mat.strength.Xt, mat.strength.Yt), EPS);
    return { fi: sigmaEq / sigmaRef };
}

const CRITERIA = [
    { id: "max_stress", name: "Maximum Stress", color: "#94a3b8", compute: computeMaximumStress },
    { id: "max_strain", name: "Maximum Strain", color: "#60a5fa", compute: computeMaximumStrain },
    { id: "tsai_hill", name: "Tsai-Hill", color: "#38bdf8", compute: computeTsaiHill },
    { id: "von_mises", name: "von Mises", color: "#fde047", compute: computeVonMises }
];

const activeCriteria = new Set(["max_stress", "max_strain", "tsai_hill", "von_mises"]);

function getStressExtents() {
    const s = material.strength;
    return {
        x: Math.max(s.Xt, s.Xc) * 1.35,
        y: Math.max(s.Yt, s.Yc) * 1.6,
        z: Math.max(s.S, 1) * 2.2
    };
}

const stressExtents = getStressExtents();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(2.9, 2.0, 2.6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("container").appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxDistance = 20;
controls.minDistance = 0.55;

scene.add(new THREE.AmbientLight(0xffffff, 0.47));
const lightA = new THREE.PointLight(0xffffff, 0.62);
lightA.position.set(5000, 4500, 4200);
scene.add(lightA);
const lightB = new THREE.PointLight(0x9fd7ff, 0.26);
lightB.position.set(-4200, -2000, 4000);
scene.add(lightB);

const axes = new THREE.Group();
axes.add(createAxisLine(new THREE.Vector3(-1.2, 0, 0), new THREE.Vector3(1.2, 0, 0), 0xff4040));
axes.add(createAxisLine(new THREE.Vector3(0, -1.2, 0), new THREE.Vector3(0, 1.2, 0), 0x4cff4c));
axes.add(createAxisLine(new THREE.Vector3(0, 0, -1.2), new THREE.Vector3(0, 0, 1.2), 0x4c7dff));
scene.add(axes);

scene.add(createAxisLabel("sigma1", new THREE.Vector3(1.35, 0, 0), "#ff7676"));
scene.add(createAxisLabel("sigma2", new THREE.Vector3(0, 1.35, 0), "#7dff7d"));
scene.add(createAxisLabel("tau12", new THREE.Vector3(0, 0, 1.35), "#7da7ff"));

const surfaceGroup = new THREE.Group();
scene.add(surfaceGroup);

const surfaceConfig = {
    resolution: 64,
    fieldClamp: 4
};

function createAxisLine(start, end, color) {
    const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
    const material = new THREE.LineBasicMaterial({ color });
    return new THREE.Line(geometry, material);
}

function createAxisLabel(text, position, color) {
    const canvas = document.createElement("canvas");
    canvas.width = 192;
    canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = "bold 30px Inter, Manrope, sans-serif";
    ctx.fillStyle = color;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);

    const texture = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
    sprite.position.copy(position);
    sprite.scale.set(0.22, 0.075, 1);
    return sprite;
}

function setStatus(message) {
    document.getElementById("render-status").textContent = message;
}

function evaluateCriterion(criterion, stress) {
    const out = criterion.compute(stress, material);
    const fi = Number.isFinite(out.fi) ? Math.max(out.fi, 0) : Number.POSITIVE_INFINITY;
    return fi;
}

function sampleCriterionFieldToMarchingCubes(criterion, marchingObject) {
    const size = marchingObject.size;
    const size2 = size * size;
    const clamp = surfaceConfig.fieldClamp;

    for (let z = 0; z < size; z += 1) {
        const nz = (z / (size - 1)) * 2 - 1;
        const tau12 = nz * stressExtents.z;
        const zOffset = z * size2;

        for (let y = 0; y < size; y += 1) {
            const ny = (y / (size - 1)) * 2 - 1;
            const sigma2 = ny * stressExtents.y;
            const yzOffset = zOffset + y * size;

            for (let x = 0; x < size; x += 1) {
                const nx = (x / (size - 1)) * 2 - 1;
                const sigma1 = nx * stressExtents.x;
                const fi = evaluateCriterion(criterion, { sigma1, sigma2, tau12 });
                let fieldValue = 1 - fi;
                if (!Number.isFinite(fieldValue)) fieldValue = -clamp;
                fieldValue = Math.max(-clamp, Math.min(clamp, fieldValue));
                marchingObject.field[yzOffset + x] = fieldValue;
            }
        }
    }
}

function buildSurfaceGeometryMarching(criterion) {
    const mc = new THREE.MarchingCubes(surfaceConfig.resolution, new THREE.MeshBasicMaterial(), false, false);
    mc.isolation = 0;
    mc.reset();
    sampleCriterionFieldToMarchingCubes(criterion, mc);

    const geometry = mc.generateBufferGeometry();
    geometry.computeVertexNormals();
    return geometry;
}

function clearSurfaces() {
    while (surfaceGroup.children.length > 0) {
        const child = surfaceGroup.children[surfaceGroup.children.length - 1];
        surfaceGroup.remove(child);
        child.traverse(node => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) {
                if (Array.isArray(node.material)) node.material.forEach(m => m.dispose());
                else node.material.dispose();
            }
        });
    }
}

function rebuildSurfaces() {
    const active = CRITERIA.filter(c => activeCriteria.has(c.id));
    const start = performance.now();
    setStatus(`Rendering ${active.length} surface(s) with Marching Cubes...`);

    clearSurfaces();
    let renderedCount = 0;

    active.forEach(criterion => {
        const geometry = buildSurfaceGeometryMarching(criterion);
        if (!geometry || !geometry.getAttribute("position") || geometry.getAttribute("position").count === 0) {
            return;
        }
        const solid = new THREE.Mesh(
            geometry,
            new THREE.MeshStandardMaterial({
                color: new THREE.Color(criterion.color),
                transparent: true,
                opacity: 0.34,
                roughness: 0.46,
                metalness: 0.05,
                side: THREE.DoubleSide,
                depthWrite: false
            })
        );
        surfaceGroup.add(solid);
        renderedCount += 1;
    });

    const elapsed = performance.now() - start;
    setStatus(`Rendered ${renderedCount}/${active.length} surface(s) in ${elapsed.toFixed(0)} ms`);
}

function buildCriteriaPanel() {
    const container = document.getElementById("criteria-list");
    container.innerHTML = "";

    CRITERIA.forEach(criterion => {
        const row = document.createElement("div");
        row.className = "criterion-row";

        const left = document.createElement("div");
        left.className = "criterion-left";

        const dot = document.createElement("span");
        dot.className = "criterion-dot";
        dot.style.background = criterion.color;

        const name = document.createElement("span");
        name.className = "criterion-name";
        name.textContent = criterion.name;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = activeCriteria.has(criterion.id);
        checkbox.addEventListener("change", () => {
            if (checkbox.checked) activeCriteria.add(criterion.id);
            else activeCriteria.delete(criterion.id);
            rebuildSurfaces();
        });

        left.appendChild(dot);
        left.appendChild(name);
        row.appendChild(left);
        row.appendChild(checkbox);
        container.appendChild(row);
    });
}

function resetView() {
    camera.position.set(2.9, 2.0, 2.6);
    camera.up.set(0, 1, 0);
    controls.target.set(0, 0, 0);
    controls.update();
}

document.getElementById("btn-reset-view").addEventListener("click", resetView);

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

buildCriteriaPanel();
rebuildSurfaces();
animate();
</script>

</body>
</html>
